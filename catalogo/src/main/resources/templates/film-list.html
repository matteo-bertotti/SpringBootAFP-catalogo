<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo Film</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
          crossorigin="anonymous">
</head>
<body>
<main class="container py-4 page-enter">
    <section class="card shadow-sm border-0">
        <div class="card-body p-4 p-lg-5">
        <header class="d-flex flex-column flex-lg-row justify-content-between align-items-start align-items-lg-center gap-3 mb-4">
            <div>
                <p class="text-uppercase text-secondary fw-semibold small mb-1">Catalogo</p>
                <h1 class="h3 mb-0">Film disponibili</h1>
            </div>
            <div class="d-flex flex-wrap gap-2">
                <a class="btn btn-primary" th:href="@{/new}">Aggiungi nuovo film</a>
                <a class="btn btn-danger" th:href="@{/film/deleteAll}"
                   onclick="return confirm('Confermi lo svuotamento completo del catalogo?');">
                    Svuota catalogo
                </a>
            </div>
        </header>

        <div class="alert alert-success" th:if="${newFilm}" th:text="${newFilm}"></div>
        <div class="alert alert-warning" th:if="${deleteFilm}" th:text="${deleteFilm}"></div>
        <div class="alert alert-warning" th:if="${deleteAll}" th:text="${deleteAll}"></div>

        <div th:if="${#lists.isEmpty(films)}" class="alert alert-info mb-0">
            Nessun elemento presente nel catalogo. Aggiungi il primo film per iniziare.
        </div>

        <div class="table-responsive" th:if="${not #lists.isEmpty(films)}">
            <table class="table table-striped table-hover align-middle mb-0">
                <thead class="table-light">
                <tr>
                    <th>Codice</th>
                    <th>Titolo</th>
                    <th>Autore / Produttore</th>
                    <th>Genere</th>
                    <th>Anno</th>
                    <th>Azioni</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="film : ${films}">
                    <td>
                        <a th:href="@{/film(id=${film.id})}" th:text="${film.id}"></a>
                    </td>
                    <td th:text="${film.titolo}"></td>
                    <td th:text="${film.autore}"></td>
                    <td th:text="${film.genere}"></td>
                    <td th:text="${film.annoPubblicazione}"></td>
                    <td>
                        <a class="btn btn-sm btn-outline-primary me-1" th:href="@{/film/edit/{id}(id=${film.id})}">
                            Modifica
                        </a>
                        <a class="btn btn-sm btn-outline-danger" th:href="@{/film/delete/{id}(id=${film.id})}"
                           onclick="return confirm('Confermi l\'eliminazione di questo elemento?');">
                            Elimina
                        </a>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        </div>
    </section>
</main>
</body>
</html>
