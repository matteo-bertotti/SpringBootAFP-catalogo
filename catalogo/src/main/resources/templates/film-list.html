<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalogo Film</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
          crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="container py-5 page-enter">
    <section class="card glass-card shadow-lg rounded-4 overflow-hidden">
        <div class="card-body p-4 p-lg-5">
        <header class="d-flex flex-column flex-lg-row justify-content-between align-items-start align-items-lg-center gap-3 mb-4 pb-3 border-bottom">
            <div>
                <p class="text-uppercase text-secondary fw-semibold small mb-1">Catalogo</p>
                <h1 class="h3 mb-0">Film disponibili</h1>
            </div>
            <div class="d-flex flex-wrap gap-2">
                <a class="btn action-primary text-white rounded-pill px-4" th:href="@{/new}"><i class="bi bi-plus-circle me-2"></i>Aggiungi nuovo film</a>
                <button type="button"
                        class="btn action-danger text-white rounded-pill px-4"
                        title="Svuota catalogo"
                        aria-label="Svuota catalogo"
                        data-delete-url="/film/deleteAll"
                        data-delete-title="l'intero catalogo"
                        data-delete-mode="all"
                        data-bs-toggle="modal"
                        data-bs-target="#deleteFilmModal">
                    <i class="bi bi-trash3-fill me-2"></i>Svuota catalogo
                </button>
            </div>
        </header>

        <div class="alert alert-success border-0 shadow-sm" th:if="${newFilm}" th:text="${newFilm}"></div>
        <div class="alert alert-warning border-0 shadow-sm" th:if="${deleteFilm}" th:text="${deleteFilm}"></div>
        <div class="alert alert-warning border-0 shadow-sm" th:if="${deleteAll}" th:text="${deleteAll}"></div>

        <div th:if="${#lists.isEmpty(films)}" class="alert alert-info mb-0">
            Nessun elemento presente nel catalogo. Aggiungi il primo film per iniziare.
        </div>

        <div class="table-responsive glass-element rounded-4 overflow-hidden" th:if="${not #lists.isEmpty(films)}">
            <table class="table table-hover align-middle mb-0">
                <thead class="table-dark text-uppercase small opacity-75">
                <tr>
                    <th>Codice</th>
                    <th>
                        <a class="text-light text-decoration-none d-inline-flex align-items-center gap-1"
                           th:href="@{/(sort='titolo',dir=${sort == 'titolo' and dir == 'asc' ? 'desc' : 'asc'})}">
                            Titolo
                            <i class="bi"
                               th:classappend="${sort == 'titolo'} ? (${dir == 'asc'} ? ' bi-sort-alpha-down' : ' bi-sort-alpha-down-alt') : ' bi-arrow-down-up'"></i>
                        </a>
                    </th>
                    <th>
                        <a class="text-light text-decoration-none d-inline-flex align-items-center gap-1"
                           th:href="@{/(sort='autore',dir=${sort == 'autore' and dir == 'asc' ? 'desc' : 'asc'})}">
                            Autore / Produttore
                            <i class="bi"
                               th:classappend="${sort == 'autore'} ? (${dir == 'asc'} ? ' bi-sort-alpha-down' : ' bi-sort-alpha-down-alt') : ' bi-arrow-down-up'"></i>
                        </a>
                    </th>
                    <th>
                        <a class="text-light text-decoration-none d-inline-flex align-items-center gap-1"
                           th:href="@{/(sort='genere',dir=${sort == 'genere' and dir == 'asc' ? 'desc' : 'asc'})}">
                            Genere
                            <i class="bi"
                               th:classappend="${sort == 'genere'} ? (${dir == 'asc'} ? ' bi-sort-alpha-down' : ' bi-sort-alpha-down-alt') : ' bi-arrow-down-up'"></i>
                        </a>
                    </th>
                    <th>
                        <a class="text-light text-decoration-none d-inline-flex align-items-center gap-1"
                           th:href="@{/(sort='anno',dir=${sort == 'anno' and dir == 'asc' ? 'desc' : 'asc'})}">
                            Anno
                            <i class="bi"
                               th:classappend="${sort == 'anno'} ? (${dir == 'asc'} ? ' bi-sort-numeric-down' : ' bi-sort-numeric-down-alt') : ' bi-arrow-down-up'"></i>
                        </a>
                    </th>
                    <th>Azioni</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="film : ${films}">
                    <td>
                        <a class="fw-semibold text-decoration-none link-info" th:href="@{/film(id=${film.id})}" th:text="${film.id}"></a>
                    </td>
                    <td th:text="${film.titolo}"></td>
                    <td th:text="${film.autore}"></td>
                    <td th:text="${film.genere}"></td>
                    <td th:text="${film.annoPubblicazione}"></td>
                    <td>
                        <a class="btn btn-sm btn-outline-info rounded-circle me-1" th:href="@{/film/edit/{id}(id=${film.id})}"
                           title="Modifica" aria-label="Modifica film">
                            <i class="bi bi-pencil-square"></i>
                        </a>
                        <button type="button"
                                class="btn btn-sm btn-outline-danger rounded-circle"
                                title="Elimina"
                                aria-label="Elimina film"
                                th:attr="data-delete-url=@{/film/delete/{id}(id=${film.id})}, data-film-title=${film.titolo}"
                                data-bs-toggle="modal"
                                data-bs-target="#deleteFilmModal">
                            <i class="bi bi-trash"></i>
                        </button>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
        </div>
    </section>
</main>

<div class="modal fade" id="deleteFilmModal" tabindex="-1" aria-labelledby="deleteFilmModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content glass-card border-0 rounded-4 overflow-hidden">
            <div class="modal-header border-0 pb-0">
                <div>
                    <p class="text-uppercase text-danger fw-semibold small mb-1">Conferma eliminazione</p>
                    <h5 class="modal-title mb-0" id="deleteFilmModalLabel">Elimina elemento</h5>
                </div>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Chiudi"></button>
            </div>
            <div class="modal-body pt-3">
                <p class="mb-0 text-secondary">Stai per <span class="fw-semibold text-light" id="deleteFilmAction">eliminare</span> <span class="fw-semibold text-light" id="deleteFilmTarget"></span>.</p>
                <p class="mb-0 mt-2 text-secondary">L'operazione non può essere annullata.</p>
            </div>
            <div class="modal-footer border-0 pt-0">
                <button type="button" class="btn btn-outline-secondary rounded-pill px-4" data-bs-dismiss="modal">Annulla</button>
                <a href="#" class="btn btn-danger rounded-pill px-4" id="confirmDeleteFilmBtn">Elimina</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"
    crossorigin="anonymous"></script>
<script>
    const deleteModal = document.getElementById('deleteFilmModal');
    if (deleteModal) {
        deleteModal.addEventListener('show.bs.modal', event => {
            const button = event.relatedTarget;
            const deleteUrl = button.getAttribute('data-delete-url');
            const filmTitle = button.getAttribute('data-film-title');
            const deleteMode = button.getAttribute('data-delete-mode');
            document.getElementById('confirmDeleteFilmBtn').setAttribute('href', deleteUrl);
            const deleteActionElement = document.getElementById('deleteFilmAction');
            const deleteTargetElement = document.getElementById('deleteFilmTarget');
            const deleteModalLabel = document.getElementById('deleteFilmModalLabel');
            const confirmButton = document.getElementById('confirmDeleteFilmBtn');

            if (deleteMode === 'all') {
                deleteActionElement.textContent = 'svuotare';
                deleteTargetElement.textContent = button.getAttribute('data-delete-title') || 'l'intero catalogo';
                deleteModalLabel.textContent = 'Svuota catalogo';
                confirmButton.textContent = 'Svuota';
            } else {
                deleteActionElement.textContent = 'eliminare';
                deleteTargetElement.textContent = filmTitle;
                deleteModalLabel.textContent = 'Elimina elemento';
                confirmButton.textContent = 'Elimina';
            }
        });
    }
</script>
</body>
</html>
