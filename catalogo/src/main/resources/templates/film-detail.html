<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dettaglio Film</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
          crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="container py-5 page-enter">
    <section class="card glass-card shadow-lg rounded-4 overflow-hidden mx-auto" style="max-width: 780px;">
        <div class="card-body p-4 p-lg-5">
        <header class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3 mb-4 pb-3 border-bottom">
            <div>
                <p class="text-uppercase text-secondary fw-semibold small mb-1">Riepilogo</p>
                <h1 class="h3 mb-0">Dettaglio elemento</h1>
            </div>
            <a class="btn btn-outline-secondary rounded-pill px-4" th:href="@{/}">Torna al catalogo</a>
        </header>

        <div class="alert alert-success border-0 shadow-sm" th:if="${newFilm}" th:text="${newFilm}"></div>

        <dl class="row g-3 mb-4">
            <div class="col-12">
                <div class="glass-element rounded-4 p-3 shadow-sm">
                    <dt class="text-uppercase small text-secondary mb-1">Codice</dt>
                    <dd class="mb-0 fw-semibold text-light" th:text="${film.id}"></dd>
                </div>
            </div>
            <div class="col-md-6">
                <div class="glass-element rounded-4 p-3 shadow-sm h-100">
                    <dt class="text-uppercase small text-secondary mb-1">Titolo</dt>
                    <dd class="mb-0 fw-semibold text-light" th:text="${film.titolo}"></dd>
                </div>
            </div>
            <div class="col-md-6">
                <div class="glass-element rounded-4 p-3 shadow-sm h-100">
                    <dt class="text-uppercase small text-secondary mb-1">Autore / Produttore</dt>
                    <dd class="mb-0 fw-semibold text-light" th:text="${film.autore}"></dd>
                </div>
            </div>
            <div class="col-md-6">
                <div class="glass-element rounded-4 p-3 shadow-sm h-100">
                    <dt class="text-uppercase small text-secondary mb-1">Genere</dt>
                    <dd class="mb-0 fw-semibold text-light" th:text="${film.genere}"></dd>
                </div>
            </div>
            <div class="col-md-6">
                <div class="glass-element rounded-4 p-3 shadow-sm h-100">
                    <dt class="text-uppercase small text-secondary mb-1">Anno</dt>
                    <dd class="mb-0 fw-semibold text-light" th:text="${film.annoPubblicazione}"></dd>
                </div>
            </div>
        </dl>

        </div>
    </section>
</main>
</body>
</html>
