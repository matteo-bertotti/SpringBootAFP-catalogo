<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modifica Film</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
          crossorigin="anonymous">
</head>
<body>
<main class="container py-4">
    <section class="card shadow-sm border-0 mx-auto" style="max-width: 780px;">
        <div class="card-body p-4 p-lg-5">
            <header class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3 mb-4">
                <div>
                    <p class="text-uppercase text-secondary fw-semibold small mb-1">Modifica</p>
                    <h1 class="h3 mb-0">Aggiorna film</h1>
                </div>
                <a class="btn btn-outline-secondary" th:href="@{/}">Torna al catalogo</a>
            </header>

            <form th:action="@{/film/edit/{id}(id=${filmId})}" th:object="${filmForm}" method="post" class="row g-3">
                <div class="col-12">
                    <label class="form-label">Codice</label>
                    <input type="text" class="form-control" th:value="${filmId}" readonly disabled>
                </div>

                <div class="col-12">
                    <label class="form-label" for="titolo">Titolo</label>
                    <input id="titolo" class="form-control" type="text" th:field="*{titolo}" maxlength="50" required>
                    <div class="form-text text-danger" th:if="${#fields.hasErrors('titolo')}" th:errors="*{titolo}"></div>
                </div>

                <div class="col-12">
                    <label class="form-label" for="autore">Autore / Produttore</label>
                    <input id="autore" class="form-control" type="text" th:field="*{autore}" maxlength="50" required>
                    <div class="form-text text-danger" th:if="${#fields.hasErrors('autore')}" th:errors="*{autore}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label" for="genere">Genere</label>
                    <select id="genere" class="form-select" th:field="*{genere}" required>
                        <option value="">Seleziona un genere</option>
                        <option th:each="genere : ${T(it.tn.mat.catalogo.domain.Genere).values()}" th:value="${genere}" th:text="${genere}"></option>
                    </select>
                    <div class="form-text text-danger" th:if="${#fields.hasErrors('genere')}" th:errors="*{genere}"></div>
                </div>

                <div class="col-md-6">
                    <label class="form-label" for="annoPubblicazione">Anno</label>
                    <input id="annoPubblicazione" class="form-control" type="number" th:field="*{annoPubblicazione}" min="1888" max="2100" step="1" required>
                    <div class="form-text">Inserisci un anno a 4 cifre tra 1888 e 2100.</div>
                    <div class="form-text text-danger" th:if="${#fields.hasErrors('annoPubblicazione')}" th:errors="*{annoPubblicazione}"></div>
                </div>

                <div class="col-12 d-flex gap-2 mt-2 flex-wrap">
                    <button class="btn btn-primary" type="submit">Aggiorna elemento</button>
                    <a class="btn btn-outline-secondary" th:href="@{/}">Annulla</a>
                </div>
            </form>
        </div>
    </section>
</main>
</body>
</html>
