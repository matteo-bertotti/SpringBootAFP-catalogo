<!DOCTYPE html>
<html lang="it" xmlns:th="http://www.thymeleaf.org" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuovo Film</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-SgOJa3DmI69IUzQ2PVdRZhwQ+dy64/BUtbMJw1MZ8t5HZApcHrRKUc4W0kG879m7"
          crossorigin="anonymous">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="container py-5 page-enter">
    <section class="card glass-card shadow-lg rounded-4 overflow-hidden mx-auto" style="max-width: 780px;">
        <div class="card-body p-4 p-lg-5">
        <header class="d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center gap-3 mb-4 pb-3 border-bottom">
            <div>
                <p class="text-uppercase text-secondary fw-semibold small mb-1">Inserimento</p>
                <h1 class="h3 mb-0">Aggiungi un nuovo film</h1>
            </div>
            <a class="btn btn-outline-secondary rounded-pill px-4" th:href="@{/}">Torna al catalogo</a>
        </header>

        <form th:action="@{/new}" th:object="${filmForm}" method="post" class="row g-4">
            <div class="col-12">
                <label class="form-label fw-semibold text-secondary" for="titolo">Titolo</label>
                <input id="titolo" class="form-control form-control-lg" type="text" th:field="*{titolo}" maxlength="50" required>
                <div class="form-text text-danger" th:if="${#fields.hasErrors('titolo')}" th:errors="*{titolo}"></div>
            </div>

            <div class="col-12">
                <label class="form-label fw-semibold text-secondary" for="autore">Autore / Produttore</label>
                <input id="autore" class="form-control form-control-lg" type="text" th:field="*{autore}" maxlength="50" required>
                <div class="form-text text-danger" th:if="${#fields.hasErrors('autore')}" th:errors="*{autore}"></div>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-semibold text-secondary" for="genere">Genere</label>
                <select id="genere" class="form-select form-select-lg" th:field="*{genere}" required>
                    <option value="">Seleziona un genere</option>
                    <option th:each="genere : ${T(it.tn.mat.catalogo.domain.Genere).values()}" th:value="${genere}" th:text="${genere}"></option>
                </select>
                <div class="form-text text-danger" th:if="${#fields.hasErrors('genere')}" th:errors="*{genere}"></div>
            </div>

            <div class="col-md-6">
                <label class="form-label fw-semibold text-secondary" for="annoPubblicazione">Anno</label>
                <input id="annoPubblicazione" class="form-control form-control-lg" type="number" th:field="*{annoPubblicazione}" min="1888" max="2100" step="1" required>
                <div class="form-text">Inserisci un anno a 4 cifre tra 1888 e 2100.</div>
                <div class="form-text text-danger" th:if="${#fields.hasErrors('annoPubblicazione')}" th:errors="*{annoPubblicazione}"></div>
            </div>

            <div class="col-12 d-flex justify-content-end gap-2 mt-2 flex-wrap">
                <button class="btn btn-success rounded-pill px-4" type="submit"><i class="bi bi-check2-circle me-2"></i>Salva elemento</button>
                <a class="btn btn-outline-secondary rounded-pill px-4" th:href="@{/}">Annulla</a>
            </div>
        </form>
        </div>
    </section>
</main>
</body>
</html>
